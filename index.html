        #canvas-container {
            width: 100vw;

        }

        /* Interface do Usuário (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .hud-item {
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 5px solid #ff0000;
        }

        #turbo-indicator {
            color: #ffcc00;
            display: none;
            font-size: 16px;
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }
